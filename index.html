<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nadine</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    .box {
      background: #ffffff;
      border: 1px solid #000000;
      padding: 30px 80px;
    }

    .name {
      color: #000000;
      font-size: 48px;
      font-weight: 700;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="name">Nadine</div>
  </div>
</body>
</html>
